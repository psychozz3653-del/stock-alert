name: Stock Target Price Alert

on:
  schedule:
    - cron: "7,37 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests pynacl

      - name: Run alert check
        env:
          KAKAO_REST_API_KEY: ${{ secrets.KAKAO_REST_API_KEY }}
          KAKAO_CLIENT_SECRET: ${{ secrets.KAKAO_CLIENT_SECRET }}
          KAKAO_REFRESH_TOKEN: ${{ secrets.KAKAO_REFRESH_TOKEN }}
          GH_PAT: ${{ secrets.GH_PAT }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python check_alerts.py

      - name: Commit updated alerts.json
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add alerts.json
          git diff --cached --quiet || git commit -m "update alert notified status"
          git push
